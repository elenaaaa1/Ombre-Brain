<link rel="preconnect" href="https://fonts.googleapis.com" />

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Source+Serif+4:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  html, body {
    margin: 0; padding: 0;
    background: #1a1a1e;
    min-height: 100vh;
    font-family: 'Inter', -apple-system, system-ui, sans-serif;
    color: #e8e0d4;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }
  *, *::before, *::after { box-sizing: border-box; }
  button { font-family: inherit; }
  body {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
  }
  /* stage background: a warm dim study */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background:
      radial-gradient(120% 80% at 30% 20%, rgba(184,92,58,0.06), transparent 60%),
      radial-gradient(100% 80% at 80% 90%, rgba(126,155,171,0.05), transparent 60%),
      #161318;
    z-index: -1;
  }
  /* Hide scrollbar inside phone */
  .cc-scroll::-webkit-scrollbar { width: 0; height: 0; display: none; }
  .cc-scroll { scrollbar-width: none; }

  /* shared transition curve */
  :root { --cc-ease: cubic-bezier(0.4, 0.0, 0.2, 1); }
</style>
</head>
<body>
<div id="root"></div>
